<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — Ripples of Healing</title>
  <meta name="description" content="Log in to your Ripples of Healing account." />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f0f8f8 0%, #fdf6f2 100%);
      padding: 100px 20px 60px;
    }
    .auth-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 52px 48px;
      width: 100%;
      max-width: 460px;
    }
    .auth-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      margin-bottom: 32px;
      text-decoration: none;
    }
    .auth-logo-text {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--dark-charcoal);
    }
    .auth-heading {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--dark-charcoal);
      text-align: center;
      margin-bottom: 8px;
    }
    .auth-subheading {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 36px;
    }
    .auth-subheading a {
      color: var(--warm-orange);
      font-weight: 600;
      text-decoration: none;
    }
    .auth-subheading a:hover { text-decoration: underline; }
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 24px 0;
      color: var(--text-muted);
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-light);
    }
    .btn-social {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 13px 20px;
      border: 1.5px solid var(--border-light);
      border-radius: var(--radius-sm);
      background: var(--white);
      color: var(--dark-charcoal);
      font-size: 0.93rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      text-decoration: none;
      margin-bottom: 12px;
    }
    .btn-social:hover { border-color: var(--deep-teal); background: #f8fefe; }
    .btn-social svg { width: 20px; height: 20px; flex-shrink: 0; }
    .auth-forgot {
      text-align: right;
      margin-top: -12px;
      margin-bottom: 20px;
    }
    .auth-forgot a {
      font-size: 0.83rem;
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
    }
    .auth-forgot a:hover { color: var(--warm-orange); }
    .auth-submit {
      width: 100%;
      justify-content: center;
      padding: 15px;
      font-size: 1rem;
      margin-top: 8px;
    }
    .auth-footer-note {
      text-align: center;
      margin-top: 28px;
      font-size: 0.82rem;
      color: var(--text-muted);
    }
    .auth-footer-note a { color: var(--text-muted); text-decoration: underline; }
    .form-input.error {
      border-color: #EF4444;
      box-shadow: 0 0 0 3px rgba(239,68,68,0.1);
    }
    .field-error { font-size: 0.78rem; color: #EF4444; margin-top: 5px; display: none; }
    .auth-alert {
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-size: 0.88rem;
      margin-bottom: 20px;
      display: none;
    }
    .auth-alert.error   { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; }
    .auth-alert.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #15803d; }
    @media (max-width: 520px) {
      .auth-card { padding: 36px 24px; }
      .auth-heading { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <nav class="nav scrolled" id="main-nav" role="navigation" aria-label="Main navigation">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <img src="logo.svg" alt="Ripples of Healing" class="nav-logo-img" />
      </a>
      <div class="nav-actions">
        <span style="color:var(--text-muted);font-size:0.9rem;">Don't have an account?</span>
        <a href="signup.html" class="btn btn-primary btn-sm">Sign Up Free</a>
      </div>
    </div>
  </nav>

  <main class="auth-page">
    <div class="auth-card">

      <a href="index.html" class="auth-logo">
        <img src="logo.svg" alt="Ripples of Healing" class="auth-logo-img" />
      </a>

      <h1 class="auth-heading">Welcome back</h1>
      <p class="auth-subheading">New here? <a href="signup.html">Create a free account</a></p>

      <button class="btn-social" type="button" id="google-btn">
        <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continue with Google
      </button>

      <div class="auth-divider">OR</div>

      <div class="auth-alert" id="login-alert" role="alert"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="login-email">Email address</label>
          <input class="form-input" type="email" id="login-email" name="email" placeholder="you@example.com" autocomplete="email" required />
          <p class="field-error" id="email-error">Please enter a valid email address.</p>
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input class="form-input" type="password" id="login-password" name="password" placeholder="••••••••" autocomplete="current-password" required />
          <p class="field-error" id="password-error">Please enter your password.</p>
        </div>
        <div class="auth-forgot">
          <a href="#" id="forgot-link">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary auth-submit" id="login-submit">Log In</button>
      </form>

      <p class="auth-footer-note">
        By continuing you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
      </p>

    </div>
  </main>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="main.js"></script>
  <script>
    const form        = document.getElementById('login-form');
    const emailInput  = document.getElementById('login-email');
    const passInput   = document.getElementById('login-password');
    const submitBtn   = document.getElementById('login-submit');
    const alertBox    = document.getElementById('login-alert');

    function showAlert(msg, type = 'error') {
      alertBox.textContent = msg;
      alertBox.className = 'auth-alert ' + type;
      alertBox.style.display = 'block';
    }

    function showFieldError(input, errEl) {
      input.classList.add('error');
      errEl.style.display = 'block';
    }

    function clearFieldError(input, errEl) {
      input.classList.remove('error');
      errEl.style.display = 'none';
    }

    emailInput.addEventListener('input', () => clearFieldError(emailInput, document.getElementById('email-error')));
    passInput.addEventListener('input',  () => clearFieldError(passInput,  document.getElementById('password-error')));

    // Form submit — real Supabase auth
    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      alertBox.style.display = 'none';
      let valid = true;

      if (!emailInput.value || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value)) {
        showFieldError(emailInput, document.getElementById('email-error'));
        valid = false;
      }
      if (!passInput.value) {
        showFieldError(passInput, document.getElementById('password-error'));
        valid = false;
      }
      if (!valid) return;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Logging in…';

      const { data, error } = await sb.auth.signInWithPassword({
        email: emailInput.value.trim(),
        password: passInput.value,
      });

      if (error) {
        showAlert(error.message);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Log In';
        return;
      }

      submitBtn.textContent = '✓ Welcome back!';
      submitBtn.style.background = '#10B981';
      setTimeout(() => { window.location.href = 'portal.html'; }, 900);
    });

    // Google OAuth
    document.getElementById('google-btn').addEventListener('click', async function() {
      this.textContent = 'Redirecting to Google…';
      this.disabled = true;
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/portal.html' }
      });
      if (error) {
        this.textContent = 'Continue with Google';
        this.disabled = false;
        showAlert(error.message);
      }
    });

    // Forgot password
    document.getElementById('forgot-link').addEventListener('click', async function(e) {
      e.preventDefault();
      const email = emailInput.value.trim();
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        emailInput.focus();
        showFieldError(emailInput, document.getElementById('email-error'));
        showAlert('Enter your email address above first, then click Forgot password.');
        return;
      }
      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/reset-password.html'
      });
      if (error) {
        showAlert(error.message);
      } else {
        showAlert('Password reset email sent — check your inbox.', 'success');
      }
    });

    // If already logged in, go straight to portal
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'portal.html';
    });
  </script>
</body>
</html>
